name: Daily AutoBlog

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC 기준 전날 23:00)
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write

concurrency:
  group: daily-autoblog-main
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run AutoBlog pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: Prepare run summary
        if: always()
        run: |
          export RUN_DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          RUN_DIR="output/$RUN_DATE"
          if [ -d "$RUN_DIR" ]; then
            NEW_POSTS=$(find "$RUN_DIR" -maxdepth 1 -type f -name '*.md' | wc -l | tr -d ' ')
            NAVER_POSTS=$(find "$RUN_DIR" -maxdepth 1 -type f -name '*_naver.md' | wc -l | tr -d ' ')
            GOOGLE_POSTS=$(find "$RUN_DIR" -maxdepth 1 -type f -name '*_google.md' | wc -l | tr -d ' ')
          else
            NEW_POSTS=0
            NAVER_POSTS=0
            GOOGLE_POSTS=0
          fi
          QUALITY_REPORT="$RUN_DIR/_quality_report.json"
          if [ -f "$QUALITY_REPORT" ]; then
            QUALITY_TOTAL=$(python -c 'import json; d=json.load(open("output/"+__import__("os").environ["RUN_DATE"]+"/_quality_report.json")); print(len(d))')
            QUALITY_WARNINGS=$(python -c 'import json; d=json.load(open("output/"+__import__("os").environ["RUN_DATE"]+"/_quality_report.json")); print(sum(1 for x in d if x.get("status") != "pass"))')
          else
            QUALITY_TOTAL=0
            QUALITY_WARNINGS=0
          fi
          {
            echo "RUN_DATE=$RUN_DATE"
            echo "NEW_POSTS=$NEW_POSTS"
            echo "NAVER_POSTS=$NAVER_POSTS"
            echo "GOOGLE_POSTS=$GOOGLE_POSTS"
            echo "QUALITY_TOTAL=$QUALITY_TOTAL"
            echo "QUALITY_WARNINGS=$QUALITY_WARNINGS"
            echo "RUN_DIR=$RUN_DIR"
          } >> "$GITHUB_ENV"

      - name: Commit and push generated posts
        run: |
          git config user.name "AutoBlog Bot"
          git config user.email "autoblog@github-actions[bot]"
          git add output/
          git diff --staged --quiet || git commit -m "📝 Daily blog posts $(date +'%Y-%m-%d KST' -d '+9 hours')"
          git pull --rebase origin main
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "push retry ${attempt}/3"
            sleep 5
          done
          exit 1

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not configured; skipping notification."
            exit 0
          fi
          export COMMIT_SHA=$(git rev-parse --short HEAD)
          python -c 'import json, os; status=os.environ["JOB_STATUS"]; icon="✅" if status == "success" else "❌"; content=(icon+" AutoBlog 일일 실행 결과\n"+"상태: "+status+"\n"+"생성일(KST): "+os.environ.get("RUN_DATE","확인 불가")+"\n"+"신규 글: "+os.environ.get("NEW_POSTS","0")+"개 (네이버 "+os.environ.get("NAVER_POSTS","0")+"개 / 구글 "+os.environ.get("GOOGLE_POSTS","0")+"개)\n"+"품질 검사: "+os.environ.get("QUALITY_TOTAL","0")+"개 검사, 경고 "+os.environ.get("QUALITY_WARNINGS","0")+"개\n"+"저장 경로: "+os.environ.get("RUN_DIR","output")+"\n"+"커밋: "+os.environ.get("COMMIT_SHA","확인 불가")+"\n"+"받아오기: git pull origin main"); print(json.dumps({"content": content}, ensure_ascii=False))' > /tmp/discord_payload.json
          HTTP_CODE=$(curl -sS -o /tmp/discord_response.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" --data-binary @/tmp/discord_payload.json "$DISCORD_WEBHOOK_URL")
          echo "Discord webhook HTTP status: $HTTP_CODE"
          if [[ "$HTTP_CODE" != 2* ]]; then
            echo "Discord response:"
            cat /tmp/discord_response.txt
            echo "Discord notification failed; keeping job result unchanged."
          fi
